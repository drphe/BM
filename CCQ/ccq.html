<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fmarket Pro - Sharpe Ratio Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="highcharts.js"></script>
    <script src="highcharts-more.js"></script>
    <script src="annotations.js"></script>
    <script src="accessibility.js"></script>
    <script src="zoom.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    font-family: 'Inter', sans-serif;
    background: #f1f5f9;
}

.glass {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
}

/* Màu nền khi hàng được chọn */
tr.active-highlight {
    background-color: #dbeafe !important;
    /* Màu xanh nhạt của Tailwind blue-100 */
    transition: all 0.2s ease;
}

tr.active-highlight {
    border-left: 4px solid #10b981 !important;
}

tr.negative-row {
    border-left: 4px solid #ef4444;
}

.loader {
    border-top-color: #3b82f6;
    animation: spinner 1s linear infinite;
}

@keyframes spinner {
    0% {
        transform: rotate(0deg);
    }

    100% {
        transform: rotate(360deg);
    }
}

::-webkit-scrollbar-track {
    box-shadow: inset 0 0 0 grey;
    border-radius: 1px;
}

::-webkit-scrollbar-thumb {
    border-radius: 0px;
    background: #ccc;
}

::-webkit-scrollbar {
    width: 0px;
    height: 0px;
    background: transparent;
}

@media (max-width: 768px) {
    #resultsTable {
        font-size: 12px;
    }
    #resultsTable th, #resultsTable td {
        padding: 4px 8px;
    }
    #resultsTable th {
        font-size: 11px;
    }
}

    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Fmarket Analytics</h1>
                <p class="text-slate-500 italic">Tính toán hiệu suất</p>
            </div>
            <div class="relative w-full md:w-64">
                <input type="text" id="searchInput" autocomplete="off" oninput="handleFilterChange()" placeholder="Tìm mã hoặc tên quỹ..." class="search-input w-full px-4 py-2.5 rounded-2xl bg-white border border-slate-200 text-sm font-medium outline-none transition-all pl-10">
                <svg class="w-5 h-5 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <div class="flex gap-2 p-1 bg-slate-200 rounded-2xl shadow-inner">
                <button onclick="filterByType('ALL', this)" class="filter-btn active px-5 py-2 rounded-xl font-semibold transition bg-white shadow text-blue-600">Tất cả</button>
                <button onclick="filterByType('STOCK', this)" class="filter-btn px-5 py-2 rounded-xl font-semibold transition text-slate-600 hover:bg-white/60">Cổ Phiếu</button>
                <button onclick="filterByType('BALANCED', this)" class="filter-btn px-5 py-2 rounded-xl font-semibold transition text-slate-600 hover:bg-white/60">Cân Bằng</button>
            </div>
        </div>
        <div class="glass rounded-3xl shadow-2xl border border-white overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50/50">
                        <tr class="text-slate-500 uppercase text-[11px] font-bold tracking-widest border-b border-slate-100">
                            <th class="px-8 py-5">Mã Quỹ</th>
                            <th class="px-6 py-5">Tên Đầy Đủ</th>
                            <th class="px-6 py-5 text-right">Giá NAV (đ)</th>
                            <th class="px-6 py-5 text-right">Hiệu suất 12T</th>
                            <th class="px-6 py-5 text-right">CAGR 36T</th>
                        </tr>
                    </thead>
                    <tbody id="fund-table-body" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="5" class="py-20 text-center text-slate-400">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="chartModal" class="fixed inset-0 bg-slate-900/70 hidden z-[999] flex items-center justify-center ">
        <div class="bg-white " onclick="event.stopPropagation()" style="height: 100vh;overflow: scroll;">
            <button onclick="closeModal()" class="absolute top-0 right-0 text-slate-400 hover:text-black transition-all bg-slate-100 rounded-full w-12 h-12 flex items-center justify-center font-bold z-50">✕</button>
            <div id="content" class="hidden space-y-6 p-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center border border-slate-100" style="position:sticky; top:0px;z-index:2; background:white;">
                    <div>
                        <h1 id="fund-name" class="text-2xl font-black text-slate-800 uppercase tracking-tight"></h1>
                        <div class="flex items-center gap-2 mt-1">
                            <span id="fund-code" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-sm font-bold"></span>
                            <span id="fund-type" class="text-slate-500 text-sm italic"></span>
                        </div>
                    </div>
                    <div class="mt-4 md:mt-0 text-right">
                        <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">NAV gần nhất</p>
                        <p id="nav-price" class="text-3xl font-black text-blue-600"></p>
                        <span id="nav-update" class="text-slate-500 text-sm italic"></span>
                    </div>
                </div>
		    
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h2 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <span class="w-1.5 h-5 bg-blue-500 rounded-full"></span> Thông tin quỹ
                        </h2>
                        <div class="space-y-4 text-sm">
                            <div class="flex justify-between border-b border-slate-50 pb-2">
                                <span class="text-slate-500">Công ty quản lý</span>
                                <span id="owner-name" class="font-semibold text-right max-w-[120px] md:max-w-[150px] truncate"></span>
                            </div>
                            <div class="flex justify-between border-b border-slate-50 pb-2">
                                <span class="text-slate-500">Phí quản lý</span>
                                <span id="mgmt-fee" class="font-semibold"></span>
                            </div>
                            <div class="flex justify-between border-b border-slate-50 pb-2">
                                <span class="text-slate-500">Rủi ro</span>
                                <span id="risk-level" class="font-bold text-orange-500"></span>
                            </div>
                            <div class="flex justify-between border-b border-slate-50 pb-2">
                                <span class="text-slate-500">Ngày giao dịch</span>
                                <span id="trade-date" class="font-semibold text-xs md:text-sm"></span>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h2 class="font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <span class="w-1.5 h-5 bg-green-500 rounded-full"></span> Tăng trưởng lợi nhuận
                        </h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="p-4 rounded-xl bg-slate-50 text-center">
                                <p class="text-xs text-slate-400 mb-1">1 Tháng</p>
                                <p id="p-1m" class="text-sm md:text-lg font-bold"></p>
                            </div>
                            <div class="p-4 rounded-xl bg-slate-50 text-center">
                                <p class="text-xs text-slate-400 mb-1">1 Năm</p>
                                <p id="p-12m" class="text-sm md:text-lg font-bold"></p>
                            </div>
                            <div class="p-4 rounded-xl bg-slate-50 text-center">
                                <p class="text-xs text-slate-400 mb-1">3 Năm (thường niên)</p>
                                <p id="p-36m" class="text-sm md:text-lg font-bold"></p>
                            </div>
                            <div class="p-4 rounded-xl bg-blue-600 text-center text-white col-span-2 md:col-span-1">
                                <p class="text-xs text-blue-100 mb-1">Từ khi thành lập</p>
                                <p id="p-total" class="text-sm md:text-lg font-bold"></p>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="fund-description" class="text-slate-600 italic"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h2 class="font-bold text-slate-800 mb-4">Tỷ trọng theo ngành</h2>
                        <div class="h-64">
                            <canvas id="industryChart"></canvas>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <div id="holding-container" class="space-y-3 w-full h-[300px]"></div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="chartContainer" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 w-full h-[300px] md:h-[400px]"></div>
                    <div id="container2" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 w-full h-[300px] md:h-[400px]"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="container3" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 w-full h-[300px] md:h-[400px]"></div>
                    <div id="container4" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 w-full h-[300px] md:h-[400px]"></div>
                </div>
                <div id="analysisArea" class="mt-8 gap-4 border-t pt-6 bg-slate-50 rounded-2xl p-6"></div>
            </div>
        </div>
    </div>
    <script src="fund.js"></script>

</body>

</html>
